name: CI Teste

run-name: ${{ github.actor }} executando testes 🚀

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes com Maven
        run: mvn clean verify

      - name: Notificação no Discord (sucesso)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD }}
        uses: Ilshidur/action-discord@master
        with:
          args: '✅ Testes passaram para ${{ github.repository }}'

      - name: Notificação no Discord (falha)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD }}
        uses: Ilshidur/action-discord@master
        with:
          args: '❌ Testes falharam para ${{ github.repository }}'